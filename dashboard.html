<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOOVED Field Dashboard — Manager View</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f4f8;--card:rgba(255,255,255,0.85);--card-border:rgba(255,255,255,0.5);--shadow:0 4px 24px rgba(0,0,0,.06);--text:#1a2332;--text2:#5b6b7e;--accent:#6366f1;--accent2:#8b5cf6;--accent3:#06b6d4;--grad:linear-gradient(135deg,#6366f1,#8b5cf6,#06b6d4);--green:#10b981;--orange:#f59e0b;--red:#ef4444;--input:#fff;--input-border:#d1d9e6;--radius:14px;--rs:8px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:20px;min-height:100vh;overflow-x:hidden}
.dash{max-width:1400px;margin:0 auto}
h1{font-size:24px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.sub{font-size:13px;color:var(--text2);margin-bottom:12px}

.url-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.url-bar input{flex:1;min-width:200px;padding:10px 14px;border-radius:var(--rs);border:2px solid var(--input-border);background:var(--input);color:var(--text);font-size:14px;font-family:var(--font)}
.url-bar input:focus{outline:none;border-color:var(--accent)}
.url-bar button{padding:10px 18px;border-radius:var(--rs);border:none;background:var(--grad);color:#fff;font-weight:600;cursor:pointer;font-size:13px;font-family:var(--font);white-space:nowrap}
.url-bar .status{font-size:12px;color:var(--text2);padding:10px 0;white-space:nowrap}

.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.kpi-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:14px 8px;box-shadow:var(--shadow);text-align:center}
.kpi-card .num{font-size:26px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.kpi-card .lbl{font-size:10px;color:var(--text2);margin-top:2px}

.sp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:10px;margin-bottom:14px}
.sp-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.sp-card h3{font-size:15px;margin-bottom:6px}
.sp-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid var(--card-border)}
.sp-row .l{color:var(--text2)}.sp-row .v{font-weight:600}
.bar{height:5px;border-radius:3px;background:#e5e7eb;margin:3px 0;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--grad);transition:width .5s ease}

/* GPS detail */
.gps-detail{margin-top:6px;padding:6px;background:var(--input);border-radius:6px;font-size:10px;max-height:100px;overflow-y:auto}
.gps-detail .gps-row{padding:2px 0;border-bottom:1px solid var(--card-border);display:flex;gap:6px}
.gps-detail .gps-row .gd{font-weight:600;min-width:80px}
.gps-detail .gps-row .gc{color:var(--text2)}
.gps-detail .gps-row .gp{color:var(--accent);margin-left:auto}
.photo-count{display:inline-block;padding:1px 6px;border-radius:4px;background:rgba(236,72,153,.12);color:#ec4899;font-size:10px;font-weight:600}

/* Map */
#map{height:400px;border-radius:var(--radius);margin-bottom:14px;background:var(--card)}

/* Timeline */
.tl-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:14px}
.tl-card h2{font-size:14px;margin-bottom:6px}
.tl-item{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid var(--card-border);font-size:11px;align-items:flex-start}
.tl-time{color:var(--text2);white-space:nowrap;min-width:60px;font-size:10px}
.tl-sp{font-weight:600;color:var(--accent);min-width:50px}
.tl-detail{color:var(--text);flex:1;font-size:10px}

/* Raw toggle */
.raw-toggle{cursor:pointer;font-size:11px;color:var(--accent);padding:6px;text-align:center}
.raw-data{display:none;background:var(--card);border:1px solid var(--card-border);border-radius:var(--rs);padding:10px;font-size:10px;font-family:monospace;white-space:pre-wrap;max-height:250px;overflow:auto}

.auto-bar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.auto-bar .lbl{font-size:11px;color:var(--text2)}
.auto-bar select{padding:5px 8px;border-radius:6px;border:1px solid var(--input-border);font-size:11px;font-family:var(--font);background:var(--input);color:var(--text)}

@media(max-width:600px){.sp-grid{grid-template-columns:1fr}.kpi{grid-template-columns:repeat(3,1fr)}#map{height:250px}}
</style>
</head>
<body>
<div class="dash">
<h1>📊 MOOVED Command Center</h1>
<p class="sub">Real-time sales tracking from Google Sheets · <a href="https://leo520-dev.github.io/mooved-field-hunter/index.html" target="_blank" style="color:var(--accent);font-size:11px">Open App ↗</a></p>

<div class="url-bar">
<input id="gsUrl" placeholder="Paste Google Apps Script Web App URL..." value="">
<button onclick="loadData()">🔄 Load</button>
<span class="status" id="statusMsg">Ready</span>
</div>

<div class="auto-bar">
<span class="lbl">↻ Refresh:</span>
<select id="refreshInterval" onchange="setRefresh()">
<option value="0">Off</option><option value="10">10s</option><option value="30">30s</option><option value="60" selected>1 min</option><option value="300">5 min</option>
</select>
<span class="lbl" id="lastRefresh"></span>
</div>

<div class="kpi" id="kpiRow"></div>
<div id="map"></div>
<div class="sp-grid" id="spGrid"></div>
<div class="tl-card"><h2>📋 Recent Activity & GPS Trail</h2><div id="timeline"></div></div>
<div class="raw-toggle" onclick="toggleRaw()">📄 Raw Data ▼</div>
<div class="raw-data" id="rawData"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let allData=[];
let mapObj=null;
let refreshTimer=null;
const ACCRA_CENTER={lat:5.6037,lng:-0.1870};

const savedUrl=localStorage.getItem('dash_url')||'https://script.google.com/macros/s/AKfycbxxX289IltGm0ubEZj8yURqZPnZUVtqsKw1-xM1GY2rtb9pI8ehb_IA4XbUZCyODryfXQ/exec';
document.getElementById('gsUrl').value=savedUrl;
if(savedUrl)loadData();

async function loadData(){
  const url=document.getElementById('gsUrl').value.trim();
  if(!url){document.getElementById('statusMsg').textContent='⚠️ No URL';return}
  localStorage.setItem('dash_url',url);
  const status=document.getElementById('statusMsg');
  status.textContent='⏳ Loading...';
  try{
    const r=await fetch(url);
    const txt=await r.text();
    allData=JSON.parse(txt);
    if(!Array.isArray(allData))throw new Error('Data not array');
    render();
    status.textContent='✅ '+allData.length+' records · '+new Date().toLocaleTimeString();
  }catch(e){
    status.textContent='❌ '+e.message;
  }
}

function render(){
  if(!allData.length){document.getElementById('kpiRow').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text2)">📭 No data yet. Salespeople need to sync.</div>';return}
  
  const spMap={};
  let totalGps=0,totalPhotos=0;
  
  allData.forEach(r=>{
    const sp=r.Salesperson||'?';
    const ts=new Date(r.Timestamp).getTime();
    if(!spMap[sp])spMap[sp]={records:[],lastActive:0,gpsCount:0,noteCount:0,photoCount:0,contactCount:0,gpsPoints:[],visits:{},regions:new Set()};
    const d=spMap[sp];
    d.records.push(r);
    if(ts>d.lastActive)d.lastActive=ts;
    d.regions.add(r.Region||'?');
    
    // Parse visits
    try{const v=JSON.parse(r.Visits||'{}');d.visits=v}catch(e){}
    // Parse GPS
    try{const g=JSON.parse(r.GPS||'{}');Object.keys(g).forEach(dist=>{const pts=g[dist]||[];pts.forEach(p=>{if(p.lat&&p.lng){d.gpsPoints.push({lat:p.lat,lng:p.lng,district:dist,ts:new Date(p.ts).toLocaleString(),sp});d.gpsCount++;totalGps++}})});
    }catch(e){}
    // Parse notes
    try{d.noteCount+=Object.values(JSON.parse(r.Notes||'{}')).flat().length}catch(e){}
    // Parse contacts
    try{const cc=JSON.parse(r.Contacts||'{}');Object.keys(cc).forEach(k=>{d.contactCount+=cc[k].length})}catch(e){}
    // Parse photo count
    try{const pc=JSON.parse(r['Photo Count']||'{}');Object.keys(pc).forEach(k=>{d.photoCount+=pc[k];totalPhotos+=pc[k]})}catch(e){}
  });

  const spCount=Object.keys(spMap).length;
  const today=new Date().toDateString();
  const todayVisits=allData.filter(r=>new Date(r.Timestamp).toDateString()===today).length;

  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi-card"><div class="num">${allData.length}</div><div class="lbl">Syncs</div></div>
    <div class="kpi-card"><div class="num">${spCount}</div><div class="lbl">Salespeople</div></div>
    <div class="kpi-card"><div class="num">${totalGps}</div><div class="lbl">GPS Checkins</div></div>
    <div class="kpi-card"><div class="num">${totalPhotos}</div><div class="lbl">Photos Taken</div></div>
    <div class="kpi-card"><div class="num">${todayVisits}</div><div class="lbl">Today</div></div>
  `;

  // Per-salesperson cards
  const totalDist=22;
  document.getElementById('spGrid').innerHTML=Object.keys(spMap).sort().map(sp=>{
    const d=spMap[sp];
    const minAgo=Math.round((Date.now()-d.lastActive)/60000);
    const status=minAgo<5?'🟢 Online':minAgo<60?'🟡 '+minAgo+'m ago':'🔴 '+Math.round(minAgo/60)+'h ago';
    const visited=Object.values(d.visits||{}).filter(v=>v==='Yes').length;
    const pct=Math.round(visited/totalDist*100);
    const gpsHtml=d.gpsPoints.length?d.gpsPoints.slice(0,6).map(g=>
      `<div class="gps-row"><span class="gd">${g.district}</span><span class="gc">${g.ts}</span><span class="gp">${g.lat.toFixed(4)},${g.lng.toFixed(4)}</span></div>`
    ).join(''):'<div style="font-size:10px;color:var(--text2)">No GPS data yet</div>';
    
    return `<div class="sp-card">
      <h3>👤 ${sp} <span style="font-size:10px;font-weight:400;color:var(--text2)">${status}</span></h3>
      <div class="sp-row"><span class="l">Districts visited</span><span class="v">${visited}/${totalDist} (${pct}%)</span></div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="sp-row"><span class="l">GPS check-ins</span><span class="v">${d.gpsCount} locations <span class="photo-count">📸 ${d.photoCount} photos</span></span></div>
      <div class="sp-row"><span class="l">Notes · Contacts</span><span class="v">${d.noteCount} notes · ${d.contactCount} contacts</span></div>
      <div class="sp-row"><span class="l">Regions</span><span class="v">${[...d.regions].join(', ')||'Accra'}</span></div>
      <div class="sp-row"><span class="l">Last active</span><span class="v">${new Date(d.lastActive).toLocaleString()}</span></div>
      <div style="font-size:10px;font-weight:600;color:var(--accent);margin-top:6px">📍 Recent GPS Trail:</div>
      <div class="gps-detail">${gpsHtml}</div>
    </div>`;
  }).join('');

  // Timeline
  document.getElementById('timeline').innerHTML=allData.slice(-50).reverse().map(r=>{
    const ts=new Date(r.Timestamp);
    let action='📤 Sync';
    let detail='';
    try{
      const gps=JSON.parse(r.GPS||'{}');
      const dists=Object.keys(gps).filter(k=>gps[k].length);
      if(dists.length)action='📍 GPS: '+dists.join(', ');
    }catch(e){}
    try{
      const notes=JSON.parse(r.Notes||'{}');
      const first=Object.values(notes).flat()[0];
      if(first)detail='📝 "'+first.text.slice(0,50)+'"';
    }catch(e){}
    try{
      const pc=JSON.parse(r['Photo Count']||'{}');
      const total=Object.values(pc).reduce((s,v)=>s+v,0);
      if(total)detail+=(detail?' · ':'')+'📸 '+total+' photo(s)';
    }catch(e){}
    return `<div class="tl-item">
      <span class="tl-time">${ts.toLocaleDateString()}<br>${ts.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
      <span class="tl-sp">${r.Salesperson||'?'}</span>
      <div class="tl-detail">${action}<br>${detail}</div>
    </div>`;
  }).join('')||'<div style="font-size:11px;color:var(--text2);padding:6px">No activity</div>';

  // Render map
  renderMap();
  document.getElementById('rawData').textContent=JSON.stringify(allData,null,2);
}

function renderMap(){
  if(mapObj){mapObj.remove();mapObj=null}
  const container=document.getElementById('map');
  if(!container||!allData.length)return;
  mapObj=L.map(container).setView([ACCRA_CENTER.lat,ACCRA_CENTER.lng],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'©OSM'}).addTo(mapObj);
  
  const colors={};const palette=['#6366f1','#10b981','#f59e0b','#ef4444','#ec4899','#06b6d4'];
  let ci=0;
  
  allData.forEach(r=>{
    try{
      const gps=JSON.parse(r.GPS||'{}');
      const sp=r.Salesperson||'?';
      if(!colors[sp]){colors[sp]=palette[ci%palette.length];ci++}
      const color=colors[sp];
      Object.keys(gps).forEach(dist=>{(gps[dist]||[]).forEach(g=>{
        if(g.lat&&g.lng){
          L.circleMarker([g.lat,g.lng],{radius:7,color,fillColor:color,fillOpacity:.5,weight:2})
          .addTo(mapObj).bindTooltip(sp+': '+dist,{direction:'top'})
          .bindPopup('<b>'+sp+'</b><br>🏠 '+dist+'<br>🕐 '+new Date(g.ts).toLocaleString()+'<br>📍 '+g.lat.toFixed(4)+','+g.lng.toFixed(4));
        }
      })});
    }catch(e){}
  });
  
  // Legend
  const legend=L.control({position:'bottomright'});
  legend.onAdd=function(){
    const div=L.DomUtil.create('div','legend');
    div.style.cssText='background:rgba(255,255,255,0.9);padding:6px 10px;border-radius:6px;font-size:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)';
    div.innerHTML=Object.keys(colors).map(sp=>`<div style="display:flex;align-items:center;gap:4px;padding:1px 0"><span style="width:10px;height:10px;border-radius:50%;background:${colors[sp]};display:inline-block"></span>${sp}</div>`).join('');
    return div;
  };
  legend.addTo(mapObj);
  
  setTimeout(()=>mapObj.invalidateSize(),400);
}

function setRefresh(){
  if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null}
  const sec=parseInt(document.getElementById('refreshInterval').value);
  if(sec>0){
    refreshTimer=setInterval(loadData,sec*1000);
    document.getElementById('lastRefresh').textContent='every '+sec+'s';
  }else{
    document.getElementById('lastRefresh').textContent='off';
  }
}

function toggleRaw(){const el=document.getElementById('rawData');el.style.display=el.style.display==='block'?'none':'block'}
setRefresh();
</script>
</body>
</html>
